apiVersion: 1
deleteDatasources:
  - name: PostgreSQL
    orgId: 1
datasources:
  - name: PostgreSQL
    type: grafana-postgresql-datasource
    uid: postgres
    url: localhost:5432
    user: jer
    database: quant_fund
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      database: quant_fund
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    isDefault: true
